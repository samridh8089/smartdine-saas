name: Build Android APK and AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Disable PostCSS for Vite
        run: mv postcss.config.mjs postcss.config.mjs.disabled || true

      - name: Build Web App
        run: npm run build > build.log 2>&1

      - name: Create Issue on Failure
        if: failure()
        run: |
          jq -Rs '{"title": "Build Failed Log", "body": "```\n\\(.)\n```"}' build.log > issue.json
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/issues -d @issue.json
          exit 1

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        
      - name: Build AAB
        working-directory: ./android
        run: ./gradlew bundleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
