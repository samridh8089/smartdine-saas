name: Build Android APK and AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Disable PostCSS for Vite
        run: mv postcss.config.mjs postcss.config.mjs.disabled || true

      - name: Build Web App
        run: npm run build > build.log 2>&1 || (git config --global user.email "actions@github.com" && git config --global user.name "GitHub Actions" && git checkout -b debug-log && git add build.log && git commit -m "Add build log" && git push origin debug-log -f && exit 1)

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        
      - name: Build AAB
        working-directory: ./android
        run: ./gradlew bundleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.aab
          path: android/app/build/outputs/bundle/debug/app-debug.aab
